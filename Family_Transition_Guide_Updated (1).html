<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Transition Planning Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#f0ece4;color:#1a1e2a;overflow:hidden}
#shell{display:flex;flex-direction:column;height:100vh}
#header{background:#1b2333;padding:0 22px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05)}
#header-left{display:flex;align-items:center;gap:14px;padding:11px 0}
#logo{width:34px;height:34px;border-radius:4px;background:#c4501e;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Serif',serif;font-weight:600;font-size:12.5px;color:#fff;letter-spacing:-.3px}
#app-title{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:16px;color:#fff;letter-spacing:-.2px;line-height:1.2}
#app-sub{font-size:10.5px;color:rgba(255,255,255,.38);margin-top:2px}
#lang-btn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:none;padding:7px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;border-radius:4px}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:198px;background:#1b2333;padding:14px 0;flex-shrink:0;overflow-y:auto;border-right:1px solid rgba(255,255,255,.03)}
.nav-divider{height:1px;background:rgba(255,255,255,.06);margin:7px 16px}
.nav-btn{display:block;width:100%;text-align:left;padding:7px 16px;background:transparent;color:rgba(255,255,255,.6);border:none;border-left:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;font-weight:400;line-height:1.4;transition:all .1s}
.nav-btn.active{background:rgba(255,255,255,.06);color:#f0c185;border-left-color:#c4501e;font-weight:600}
#main{flex:1;overflow-y:auto;padding:22px 28px;background:#f0ece4}
#footer{background:#1b2333;color:rgba(255,255,255,.25);padding:6px 22px;font-size:10.5px;text-align:center;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04)}

/* ── UDL TOOLBAR ── */
#udl-bar{display:flex;align-items:center;gap:6px;padding:7px 0 10px;border-bottom:1px solid #dbd5c8;margin-bottom:22px;flex-wrap:wrap}
.udl-label{font-size:10.5px;font-weight:600;color:#6a6f80;text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.udl-sep{width:1px;height:16px;background:#dbd5c8}
.udl-txt{font-size:11px;color:#6a6f80;margin-right:2px}
.udl-btn{font-family:'IBM Plex Sans',sans-serif;border:1px solid #dbd5c8;border-radius:4px;cursor:pointer;padding:3px 11px;font-size:11.5px;font-weight:500;line-height:1.4;background:transparent;color:#6a6f80;transition:all .1s;display:inline-flex;align-items:center;gap:5px}
.udl-btn.active{background:rgba(196,80,30,.08);color:#c4501e;border-color:rgba(196,80,30,.4)}
.udl-btn-sz{font-family:'IBM Plex Serif',serif;font-weight:600;padding:2px 8px}
#sz-1{font-size:13px}.udl-btn-sz#sz-2{font-size:15.5px}.udl-btn-sz#sz-3{font-size:18px}

/* ── CONTENT ── */
#content{transition:zoom .1s}
.zoom-lg{zoom:1.15}
.zoom-xl{zoom:1.32}

/* ── SECTION HEADER ── */
.sec-h1{font-family:'IBM Plex Serif',serif;font-size:25px;font-weight:600;color:#1a1e2a;line-height:1.2;margin:0 0 6px}
.sec-sub{font-size:13px;color:#6a6f80;line-height:1.6;margin:0}
.sec-rule{margin-top:14px;height:2px;margin-bottom:28px}

/* ── CARDS ── */
.card{background:#fff;border-radius:7px;padding:17px 20px;margin-bottom:12px;border:1px solid #dbd5c8}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ── ALERTS ── */
.alert{border-left:3px solid #c4501e;padding:11px 15px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;background:#fdf1ec}
.alert.info{border-left-color:#2a6e8a;background:#eaf4f8}
.alert-dot{width:15px;height:15px;border-radius:50%;background:#c4501e;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.alert.info .alert-dot{background:#2a6e8a}
.alert-body{font-size:13px;color:#1a1e2a;line-height:1.7}

/* ── STEPS ── */
.step{display:flex;gap:14px;margin-bottom:10px;background:#fff;border-radius:7px;padding:14px 16px;border:1px solid #dbd5c8}
.step-num{width:30px;height:30px;border-radius:50%;background:#1b2333;color:#f0c185;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-weight:600;font-size:13px;flex-shrink:0}
.step-title{font-weight:600;font-size:13.5px;color:#1a1e2a;margin-bottom:3px}
.step-body{font-size:13px;color:#6a6f80;line-height:1.7}

/* ── CONTACTS ── */
.contact-card{background:#faf8f4;border-radius:6px;padding:11px 14px;border:1px solid #dbd5c8;margin-bottom:7px}
.contact-name{font-weight:600;font-size:13px;color:#1a1e2a;margin-bottom:5px}
.contact-details{font-size:12px;color:#6a6f80;display:flex;flex-wrap:wrap;gap:4px 13px}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 11px;text-align:left;font-weight:600;color:#6a6f80;border-bottom:1px solid #dbd5c8;font-size:11px;text-transform:uppercase;letter-spacing:.05em;background:#faf8f4}
.tbl td{padding:10px 11px;border-bottom:1px solid #dbd5c8;vertical-align:top;line-height:1.65;color:#6a6f80}
.tbl td:first-child{font-weight:600;color:#1a1e2a}
.tbl tr:nth-child(even) td{background:#faf8f4}
.tbl-amt{font-weight:700;color:#0e4d80}

/* ── PILLS & LABELS ── */
.pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:3px;letter-spacing:.04em}
.sub-lbl{font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* ── HEADINGS ── */
.h3{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:15px;color:#1a1e2a;margin:20px 0 10px}
.h4{font-weight:600;font-size:13.5px;color:#1a1e2a;margin-bottom:7px}

/* ── OVERVIEW CARDS ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ov-card{text-align:left;background:#fff;border:1px solid #dbd5c8;border-radius:7px;padding:15px 17px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;width:100%}
.ov-card:hover{border-color:#bfb8aa}
.ov-card-title{font-weight:600;font-size:13.5px;margin-bottom:5px}
.ov-card-desc{font-size:12px;color:#6a6f80;line-height:1.6;margin:0}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.stat-box{background:#eaf4f8;border-radius:5px;padding:10px;text-align:center}
.stat-val{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:16px;color:#2a6e8a}
.stat-lbl{font-size:10.5px;color:#2a6e8a;margin-top:2px;opacity:.8}

/* ── ELIGIBILITY GRID ── */
.elig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-top:4px}
.elig-item{background:#f0f7f2;border:1px solid #b8ddc8;border-radius:5px;padding:8px 11px;font-size:12.5px;display:flex;align-items:flex-start;gap:7px}
.elig-ck{color:#0e5c40;font-weight:700;font-size:14px;flex-shrink:0;margin-top:-1px}

/* ── DD CHIPS ── */
.dd-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.dd-chip{background:#fef3ec;border:1px solid #f0c8a0;border-radius:3px;padding:3px 10px;font-size:12px;font-weight:600;color:#7a3a10}

/* ── FUNCTIONAL GRID ── */
.func-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 10px}
.func-item{background:#f3f0f8;border:1px solid #d0c8e8;border-radius:4px;padding:7px 8px;font-size:12px;font-weight:600;text-align:center;color:#4a3282}

/* ── WAIVER BOXES ── */
.waiver-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 12px}
.waiver-box{border-radius:6px;padding:14px;text-align:center}
.waiver-box.child{background:#eaf4f8;border:2px solid #90cfe0}
.waiver-box.adult{background:#fdf1ec;border:2px solid #f0b090}
.waiver-box h4{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:13px;margin-bottom:7px}
.waiver-amt{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:22px}
.waiver-amt.c{color:#2a6e8a}
.waiver-amt.a{color:#c4501e}
.waiver-sub{font-size:11px;color:#6a6f80;margin-top:3px}

/* ── SERVICE CHIPS ── */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px;margin-top:8px}
.svc-chip{background:#f0f7f2;border:1px solid #b8ddc8;border-radius:4px;padding:7px 10px;font-size:12px;font-weight:600;text-align:center;color:#0e5c40}

/* ── ISC CARDS ── */
.isc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.isc-card{border-radius:6px;padding:13px;border:2px solid}
.isc-card.n{background:#f0f7f2;border-color:#b8ddc8}
.isc-card.s{background:#eaf4f8;border-color:#90cfe0}
.isc-dir{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.isc-card.n .isc-dir{color:#0e5c40}
.isc-card.s .isc-dir{color:#2a6e8a}
.isc-card h4{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:13.5px;margin-bottom:7px}
.isc-card p{font-size:12px;color:#6a6f80;line-height:1.6;margin-bottom:2px}

/* ── PROGRAM CARDS ── */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;margin-top:8px}
.prog-card{background:#f3f0f8;border:1px solid #d0c8e8;border-radius:6px;padding:11px 13px}
.prog-card h4{font-weight:600;font-size:13px;color:#4a3282;margin-bottom:2px}
.prog-card p{font-size:11.5px;color:#6a6f80}

/* ── COMPARE GRID ── */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.compare-col{border-radius:6px;padding:14px;border-top:3px solid}
.compare-col.idea{background:#eaf4f8;border-color:#2a6e8a}
.compare-col.ada{background:#f0f7f2;border-color:#0e5c40}
.compare-col h3{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:14px;margin-bottom:4px}
.compare-col .law-sub{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.compare-col.idea .law-sub{color:#2a6e8a}
.compare-col.ada .law-sub{color:#0e5c40}
.compare-col ul{padding-left:14px;font-size:12.5px}
.compare-col li{margin-bottom:3px;color:#6a6f80}

/* ── NOTE BOX ── */
.note-box{background:#fef9ec;border-left:3px solid #c4901e;border-radius:0 5px 5px 0;padding:9px 13px;font-size:12.5px;font-weight:500;margin-top:12px;color:#7a5010}

/* ── CHECKLIST ── */
.progress-bar-wrap{background:#dbd5c8;border-radius:100px;height:5px;overflow:hidden;margin-top:5px}
.progress-bar-fill{height:100%;border-radius:100px;transition:width .3s;background:#c4501e}
.cl-group-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid}
.cl-group-age{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:15px}
.cl-group-sub{font-size:11.5px;color:#6a6f80;font-style:italic}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;margin-bottom:5px;cursor:pointer;background:#fff;border:1px solid #dbd5c8;border-radius:0 6px 6px 0;transition:all .12s}
.cl-item.urgent{border-color:#e8b49e}
.cl-item.done{background:#f5f3ef}
.cl-item.done .cl-text{text-decoration:line-through;color:#6a6f80}
.cl-check{width:15px;height:15px;border-radius:3px;border:2px solid #c0bdb0;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:9px;font-weight:700;color:#fff;transition:all .12s}
.cl-check.checked{background:currentColor;border-color:currentColor}
.cl-text{font-size:13px;color:#1a1e2a;line-height:1.6;flex:1}
.cl-urgent-badge{font-size:10px;font-weight:600;background:#fdf1ec;color:#c4501e;padding:1px 7px;border-radius:3px;letter-spacing:.04em;flex-shrink:0;align-self:center}

/* ── CONTACTS SEARCH ── */
#contacts-search,#contacts-filter{padding:8px 12px;border:1px solid #dbd5c8;border-radius:5px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;background:#fff;color:#1a1e2a;outline:none}
#contacts-search{flex:1 1 180px}

/* ── HIGH CONTRAST ── */
body.hc{background:#111;color:#f0ede6}
body.hc #header,body.hc #sidebar,body.hc #footer{background:#000}
body.hc #main{background:#111}
body.hc .card,body.hc .step,body.hc .contact-card,body.hc .ov-card{background:#1d1d1d;border-color:#3c3c38;color:#f0ede6}
body.hc .sec-h1,body.hc .h3,body.hc .h4,body.hc .step-title{color:#f0ede6}
body.hc .sec-sub,body.hc .step-body,body.hc .alert-body,body.hc .contact-details,body.hc .tbl td{color:#b0aaa0}
body.hc .alert{background:#2a1005;border-left-color:#ff6b35}
body.hc .alert.info{background:#051822;border-left-color:#5acbf5}
body.hc .alert-dot{background:#ff6b35}
body.hc .alert.info .alert-dot{background:#5acbf5}
body.hc .tbl th,body.hc .tbl tr:nth-child(even) td{background:#1a1a1a}
body.hc .tbl{color:#b0aaa0}
body.hc .tbl th{color:#b0aaa0}
body.hc .stat-box{background:#051822}
body.hc .stat-val,body.hc .stat-lbl{color:#5acbf5}
body.hc #contacts-search,body.hc #contacts-filter{background:#1d1d1d;border-color:#3c3c38;color:#f0ede6}
body.hc #udl-bar{border-color:#3c3c38}
body.hc .udl-sep{background:#3c3c38}
body.hc .udl-btn{border-color:#3c3c38;color:#b0aaa0}
body.hc .udl-btn.active{background:rgba(255,107,53,.12);color:#ff6b35;border-color:rgba(255,107,53,.4)}
body.hc .progress-bar-wrap{background:#3c3c38}
body.hc .cl-item{background:#1d1d1d;border-color:#3c3c38}
body.hc .cl-item.done{background:#111}
body.hc .cl-item.urgent{border-color:#7a3010}
body.hc .cl-check{border-color:#888}
body.hc .contact-card{background:#1a1a1a}
body.hc .elig-item{background:#0a1a0c;border-color:#2e5c33}
body.hc .dd-chip{background:#2a1005;border-color:#7a3a10;color:#f0b090}
body.hc .func-item{background:#1a0f2e;border-color:#5a3080;color:#c0a0f0}
body.hc .waiver-box.child{background:#051822;border-color:#1a5060}
body.hc .waiver-box.adult{background:#1a0505;border-color:#7a2010}
body.hc .svc-chip{background:#0a1a0c;border-color:#2e5c33;color:#7adda0}
body.hc .isc-card.n{background:#0a1a0c;border-color:#2e5c33}
body.hc .isc-card.s{background:#051822;border-color:#1a5060}
body.hc .prog-card{background:#1a0f2e;border-color:#5a3080}
body.hc .prog-card h4{color:#c0a0f0}
body.hc .compare-col.idea{background:#051822;border-color:#2a6e8a}
body.hc .compare-col.ada{background:#0a1a0c;border-color:#0e5c40}
body.hc .note-box{background:#1a1000;color:#c5a030}

/* ── READ ALOUD ── */
.card:hover,.step:hover,.alert:hover,.contact-card:hover{cursor:pointer;outline:2px solid rgba(196,80,30,.2);outline-offset:2px}
.cl-item:hover{outline:none}
.reading{outline:2px solid #c4501e !important;outline-offset:3px}
body.hc .reading{outline-color:#ff6b35 !important}

/* ── PRINT ── */
@media print{
  #header,#sidebar,#footer,#udl-bar{display:none!important}
  body{overflow:auto!important;background:#fff!important}
  #main{overflow:visible!important;height:auto!important;padding:20px!important;background:#fff!important}
  #content{zoom:1!important}
}
</style>
</head>
<body>
<div id="shell">
  <header id="header">
    <div id="header-left">
      <div id="logo">OSD</div>
      <div>
        <div id="app-title"></div>
        <div id="app-sub">Chicago Public Schools</div>
      </div>
    </div>
    <button id="lang-btn" onclick="toggleLang()"></button>
  </header>

  <div id="body">
    <nav id="sidebar">
      <button class="nav-btn" data-key="overview"  onclick="nav('overview')"></button>
      <button class="nav-btn" data-key="idea"       onclick="nav('idea')"></button>
      <button class="nav-btn" data-key="puns"       onclick="nav('puns')"></button>
      <button class="nav-btn" data-key="legal"      onclick="nav('legal')"></button>
      <button class="nav-btn" data-key="financial"  onclick="nav('financial')"></button>
      <button class="nav-btn" data-key="college"    onclick="nav('college')"></button>
      <button class="nav-btn" data-key="programs"   onclick="nav('programs')"></button>
      <button class="nav-btn" data-key="hsp"        onclick="nav('hsp')"></button>
      <button class="nav-btn" data-key="transport"  onclick="nav('transport')"></button>
      <button class="nav-btn" data-key="recreation" onclick="nav('recreation')"></button>
      <button class="nav-btn" data-key="community"  onclick="nav('community')"></button>
      <div class="nav-divider"></div>
      <button class="nav-btn" data-key="checklist"  onclick="nav('checklist')"></button>
      <button class="nav-btn" data-key="contacts"   onclick="nav('contacts')"></button>
    </nav>

    <main id="main">
      <div id="udl-bar">
        <span class="udl-label" id="udl-lbl"></span>
        <div class="udl-sep"></div>
        <span class="udl-txt" id="udl-sz-lbl"></span>
        <button class="udl-btn udl-btn-sz active" id="sz-1" onclick="setZoom(0)">A</button>
        <button class="udl-btn udl-btn-sz" id="sz-2" onclick="setZoom(1)">A</button>
        <button class="udl-btn udl-btn-sz" id="sz-3" onclick="setZoom(2)">A</button>
        <div class="udl-sep"></div>
        <button class="udl-btn" id="hc-btn" onclick="toggleHC()">◐ <span id="hc-lbl"></span></button>
        <div class="udl-sep"></div>
        <button class="udl-btn" id="ra-btn" onclick="stopRA()">⏹ <span id="ra-lbl"></span></button>
        <div class="udl-sep"></div>
        <button class="udl-btn" onclick="window.print()">⎙ <span id="print-lbl"></span></button>
      </div>
      <div id="content"></div>
    </main>
  </div>

  <footer id="footer"><span id="disclaimer"></span> &nbsp;·&nbsp; © 2026 Catrina Wright &nbsp;·&nbsp; <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" style="color:rgba(255,255,255,.35);text-decoration:underline;">CC BY-NC 4.0</a> &nbsp;·&nbsp; Non-commercial use only &nbsp;·&nbsp; cwright.specialed@gmail.com</footer>
</div>

<script>
var S={lang:'en',section:'overview',zoom:0,hc:false,speaking:false,checked:{}};

var STR={
  en:{
    title:'Family Transition Planning Guide',
    langBtn:'Ver en Español',
    nav:{overview:'Overview',idea:'IDEA vs. ADA',puns:'1 · PUNS',legal:'2 · Legal Supports',financial:'3 · Financial Supports',college:'4 · College Funding',programs:'5 · College Programs',hsp:'6 · Home Services',transport:'7 · Transportation',recreation:'8 · Recreation',community:'9 · Community Access',checklist:'Age-Based Checklist',contacts:'Contacts Directory'},
    disclaimer:'For informational purposes only. Does not constitute legal or financial advice.',
    udl:{lbl:'Accessibility',sz:'Text Size',hc:'High Contrast',ra:'Click to Read',stop:'Stop Reading',print:'Print'},
    search:'Search contacts…',allCats:'All Categories',reset:'Reset',progress:'Progress',noResults:'No contacts match your search.',urgentBadge:'TIME-SENSITIVE'
  },
  es:{

function e(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function secHeader(title,subtitle,accentColor){var grad='linear-gradient(to right,'+accentColor+','+accentColor+'30 70%,transparent)';return '<h1 class="sec-h1">'+e(title)+'</h1>'+(subtitle?'<p class="sec-sub">'+e(subtitle)+'</p>':'')+'<div class="sec-rule" style="background:'+grad+'"></div>'}
function alert_(text,type){var cls=type==='info'?'alert info':'alert';return '<div class="'+cls+'"><div class="alert-dot">!</div><div class="alert-body">'+e(text)+'</div></div>'}
function card(inner,borderColor,side){var style='';if(borderColor&&side==='top')style='border-top:3px solid '+borderColor;if(borderColor&&side==='left')style='border-left:3px solid '+borderColor;return '<div class="card" style="'+style+'">'+inner+'</div>'}
function step(n,title,body){return '<div class="step"><div class="step-num">'+n+'</div><div><div class="step-title">'+e(title)+'</div><div class="step-body">'+e(body)+'</div></div></div>'}
function pill(text,color){return '<span class="pill" style="background:'+color+'22;color:'+color+'">'+e(text)+'</span>'}
function h3(text){return '<div class="h3">'+e(text)+'</div>'}
function h4(text){return '<div class="h4">'+e(text)+'</div>'}
function contactCard(ct){var d='';if(ct.phone)d+='<span>📞 '+e(ct.phone)+'</span>';if(ct.tollFree)d+='<span>📞 TF: '+e(ct.tollFree)+'</span>';if(ct.tty)d+='<span>TTY: '+e(ct.tty)+'</span>';if(ct.spanish)d+='<span>🌎 Español: '+e(ct.spanish)+'</span>';if(ct.email)d+='<span>✉️ '+e(ct.email)+'</span>';if(ct.web)d+='<span>🌐 '+e(ct.web)+'</span>';if(ct.address)d+='<span>📍 '+e(ct.address)+'</span>';if(ct.hours)d+='<span>🕐 '+e(ct.hours)+'</span>';if(ct.note)d+='<span style="font-style:italic">'+e(ct.note)+'</span>';return '<div class="contact-card"><div class="contact-name">'+e(ct.name)+'</div><div class="contact-details">'+d+'</div></div>'}

function renderIdea(){
  var lg=S.lang;
  if(lg==='en'){
    return secHeader('IDEA vs. ADA — Understanding the Legal Shift at Graduation','The rules governing disability services change fundamentally when a student leaves school. Every family needs to understand this shift before it happens.',CC.idea)
      +alert_('Once a student graduates or ages out of school, IDEA protections end permanently. After that point, services are not automatic — your student must apply for and meet eligibility requirements for each program separately.','urgent')
      +card('<div class="compare-grid"><div class="compare-col idea"><h3>IDEA — Individuals with Disabilities Education Act</h3><div class="law-sub">Law of Success · Active during school</div><ul><li>Students are <strong>entitled</strong> to services</li><li>Free appropriate public education (FAPE)</li><li>Specially designed instruction</li><li>Related services and LRE</li><li>Accommodations and modifications</li></ul></div><div class="compare-col ada"><h3>ADA — Americans with Disabilities Act</h3><div class="law-sub">Law of Access · Active after school</div><ul><li>Services are <strong>NOT</strong> guaranteed</li><li>Eligibility determined by outside agencies</li><li>Accommodations only — no modifications</li><li>Self-disclosure is required</li></ul></div></div>'
        +'<div class="note-box"><strong>Key takeaway:</strong> Under IDEA, the school system is obligated to provide services. Under ADA, the individual must request access and prove eligibility. Starting the PUNS and DRS processes while the student is still in school is the most important transition action a family can take.</div>')
      +h3('What This Means in Practice')
      +card('<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><div class="sub-lbl" style="color:'+CC.idea+'">In College or Vocational Training</div><ul style="padding-left:15px;font-size:12.5px;color:#6a6f80"><li style="line-height:1.7;margin-bottom:4px">Must self-disclose disability to the Disability Resource Office</li><li style="line-height:1.7;margin-bottom:4px">Accommodations provided — but not modifications to coursework</li><li style="line-height:1.7">No IEP — a 504-style accommodation plan replaces it</li></ul></div><div><div class="sub-lbl" style="color:'+CC.idea+'">In Employment</div><ul style="padding-left:15px;font-size:12.5px;color:#6a6f80"><li style="line-height:1.7;margin-bottom:4px">Employer must provide reasonable accommodations</li><li style="line-height:1.7;margin-bottom:4px">Disclosure is voluntary — but often necessary to receive support</li><li style="line-height:1.7">DRS can provide job coaching and supported employment</li></ul></div></div>');
  } else {
    return secHeader('IDEA vs. ADA — Comprendiendo el Cambio Legal al Graduarse','Las reglas que rigen los servicios de discapacidad cambian fundamentalmente cuando un estudiante deja la escuela.',CC.idea)
      +alert_('Una vez que un estudiante se gradúa o cumple la edad límite, las protecciones de IDEA terminan permanentemente. Después de ese punto, los servicios no son automáticos — su estudiante debe solicitar y cumplir los requisitos de elegibilidad para cada programa por separado.','urgent')
      +card('<div class="compare-grid"><div class="compare-col idea"><h3>IDEA — Ley de Educación para Personas con Discapacidades</h3><div class="law-sub">Ley del Éxito · Activa durante la escuela</div><ul><li>Los estudiantes tienen <strong>derecho</strong> a servicios</li><li>Educación pública gratuita y apropiada (FAPE)</li><li>Instrucción especialmente diseñada</li><li>Servicios relacionados y LRE</li><li>Acomodaciones y modificaciones</li></ul></div><div class="compare-col ada"><h3>ADA — Ley para Personas con Discapacidades de América</h3><div class="law-sub">Ley de Acceso · Activa después de la escuela</div><ul><li>Los servicios <strong>NO</strong> están garantizados</li><li>Elegibilidad determinada por agencias externas</li><li>Solo acomodaciones — sin modificaciones</li><li>La auto-divulgación es requerida</li></ul></div></div>'
        +'<div class="note-box"><strong>Conclusión clave:</strong> Bajo IDEA, el sistema escolar está obligado a proporcionar servicios. Bajo ADA, la persona debe solicitar acceso y demostrar elegibilidad. Comenzar los procesos de PUNS y DRS mientras el estudiante aún está en la escuela es la acción de transición más importante que una familia puede tomar.</div>');
  }
}

function renderPuns(){

      +card('<div class="h4">What is PUNS?</div><p style="font-size:13.5px;color:#6a6f80;line-height:1.75">PUNS is Illinois\'s official waitlist for adult developmental disability services, administered by IDHS Division of Developmental Disabilities. Two categories exist: <strong>Seeking Services</strong> (eligible for selection when funding becomes available) and <strong>Planning for Services</strong> (not eligible for selection). Families must enroll in Seeking Services. Because waitlists span several years, enrollment can begin as early as age 2½.</p>')
      +h3('PUNS Eligibility Requirements')
      +card('<div class="elig-grid">'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>U.S. citizen or legal non-citizen</span></div>'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Resident living in Illinois</span></div>'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Age 18 or older</span></div>'

        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Complete a Determination of Need (DON) assessment</span></div>'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Not require 24-hour nursing care</span></div>'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Able to be safely maintained at home or in a community setting</span></div>'
        +'<div class="elig-item"><span class="elig-ck">✓</span><span>Have an intellectual or developmental disability</span></div>'
        +'</div>')
      +h3('Definition of a Developmental Disability')
      +card('<div class="h4">A qualifying condition must be one of the following:</div>'
        +'<div class="dd-chips"><span class="dd-chip">IQ below 70</span><span class="dd-chip">Cerebral Palsy</span><span class="dd-chip">Epilepsy</span><span class="dd-chip">Autism</span><span class="dd-chip">Traumatic Brain Injury</span></div>'
        +'<div class="h4">AND result in substantial functional limitations in 3 or more of these areas:</div>'

        +'<div class="note-box"><strong>Important:</strong> The onset of the disability must occur before age 22 to qualify for PUNS and Developmental Disability Waiver services.</div>')

function renderLegal(){

      +alert_('Once a student turns 18, they become their own legal guardian unless a court has already established otherwise. Families who wait may lose critical protections.','urgent')
      +card('<div class="h4">Legal Options — Most to Least Restrictive</div>'+tbl)
      +card('<div class="h4">The Arc of Illinois — Free Legal Guidance &amp; Advocacy</div><p style="font-size:13.5px;color:#6a6f80;line-height:1.75">The Family Advocate Program at The Arc of Illinois provides outreach to adults and families — specifically those on the PUNS list or approaching a selection. The Family-to-Family Health Information Center supports families of youth under 22. Spanish-language services: 708.218.1958.</p>','#4a3282','left')
      +h3('Key Contacts — Legal Supports')+contactsGroup('legal');

    var tbl2='<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Opción</th><th>Qué Significa</th><th>Consideración Clave</th></tr></thead><tbody>'+rows2.map(function(r){return '<tr><td>'+e(r[0])+(r[3]?'<br><br>'+r[3]:'')+'</td><td>'+e(r[1])+'</td><td style="font-style:italic">'+e(r[2])+'</td></tr>';}).join('')+'</tbody></table></div>';
    return secHeader('Apoyos Legales — Decisiones Antes de los 18 Años','Muchas decisiones legales se activan con el 18° cumpleaños del estudiante.',CC.legal)
      +alert_('Una vez que un estudiante cumple 18 años, se convierte en su propio tutor legal, a menos que un tribunal ya haya establecido lo contrario.','urgent')
      +card('<div class="h4">Opciones Legales — De Mayor a Menor Restricción</div>'+tbl2)
      +card('<div class="h4">The Arc of Illinois — Orientación Legal Gratuita y Defensa</div><p style="font-size:13.5px;color:#6a6f80;line-height:1.75">El Programa de Defensores Familiares de The Arc de Illinois ofrece asistencia a adultos y familias — específicamente a quienes están en la lista PUNS o se acercan a una selección. Servicios en español: 708.218.1958.</p>','#4a3282','left')
      +h3('Contactos Clave — Apoyos Legales')+contactsGroup('legal');
  }
}

function toggleHC(){S.hc=!S.hc;document.body.classList.toggle('hc',S.hc);document.getElementById('hc-btn').classList.toggle('active',S.hc);}
var S_readEl=null;
function readElement(el){if(!window.speechSynthesis)return;stopRA();var text=(el.innerText||el.textContent||'').replace(/\n{3,}/g,'\n\n').trim();if(!text)return;S_readEl=el;el.classList.add('reading');var utt=new SpeechSynthesisUtterance(text);utt.lang=S.lang==='en'?'en-US':'es-MX';utt.rate=0.88;utt.onend=utt.onerror=function(){clearReading();};window.speechSynthesis.speak(utt);S.speaking=true;updateRABtn();}
function clearReading(){if(S_readEl){S_readEl.classList.remove('reading');S_readEl=null;}S.speaking=false;updateRABtn();}
function stopRA(){if(window.speechSynthesis)window.speechSynthesis.cancel();clearReading();}
function updateRABtn(){var str=STR[S.lang];document.getElementById('ra-btn').classList.toggle('active',S.speaking);document.getElementById('ra-lbl').textContent=S.speaking?str.udl.stop:str.udl.ra;}
document.addEventListener('click',function(evt){if(!window.speechSynthesis)return;var READABLE=['.card','.step','.alert','.contact-card'];var EXCLUDE=['.cl-item','.ov-card','button','input','select'];for(var i=0;i<EXCLUDE.length;i++){if(evt.target.closest(EXCLUDE[i]))return;}for(var j=0;j<READABLE.length;j++){var el=evt.target.closest(READABLE[j]);if(el&&document.getElementById('content').contains(el)){readElement(el);return;}}});
function toggleCheck(key){S.checked[key]=!S.checked[key];render();}
function resetChecklist(){S.checked={};render();}
function filterContacts(){var q=document.getElementById('contacts-search').value;var cat=document.getElementById('contacts-filter').value;document.getElementById('contacts-list').innerHTML=buildContactsList(q,cat);}
render();
</script>
